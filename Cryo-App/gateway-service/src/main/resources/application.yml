spring:
  application:
    name: gateway-service

  cloud:
    gateway:

      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        - id: freezer-service
          uri: lb://freezer-service
          predicates:
            - Path=/freezers/**

        - id: alert-service
          uri: lb://alert-service
          predicates:
            - Path=/alerts/**

        - id: export-service
          uri: lb://export-service
          predicates:
            - Path=/export/**

      default-filters:
        - name: DedupeResponseHeader
          args:
            name: Access-Control-Allow-Origin Access-Control-Allow-Credentials
            strategy: RETAIN_FIRST

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
              - "http://192.168.*.*:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

jwt:
  secret: my-super-secret-key-for-jwt-which-is-long
  expiration: 86400

logging:
  level:
    com.cryo.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: Freezer Service
        url: /freezers/v3/api-docs
      - name: Alert Service
        url: /alerts/v3/api-docs
      - name: Export Service
        url: /export/v3/api-docs