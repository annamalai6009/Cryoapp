server:
  port: 8084

spring:
  application:
    name: export-service
  datasource:
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      max-lifetime: 600000
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

jwt:
  secret: my-super-secret-key-for-jwt-which-is-long
  expiration: 86400

freezer:
  service:
    url: http://localhost:8082

logging:
  level:
    com.cryo.export: DEBUG

# //this line should  remove please rememeber Gopala.
springdoc:
  api-docs:
    path: /export/v3/api-docs

